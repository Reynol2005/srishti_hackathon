# ═══════════════════════════════════════════════════════════
# EcoVoice — Spring Boot Configuration
# ═══════════════════════════════════════════════════════════

server.port=8080

# ── Supabase PostgreSQL (Session Pooler) ──────────────────
spring.datasource.url=${SUPABASE_JDBC_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${SUPABASE_DB_USER:postgres}
spring.datasource.password=${SUPABASE_DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ──────────────────────────────────────
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── CORS (allow frontend dev server) ─────────────────────
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}
